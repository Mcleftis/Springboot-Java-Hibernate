apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-ai-workers
  namespace: quant-trading
  labels:
    team: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-ai-workers
  template:
    metadata:
      labels:
        app: quant-ai-workers
        team: data
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - europe-west1-b
            - weight: 50
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - europe-west4-a
      containers:
        - name: quant-ai-workers
          image: europe-west1-docker.pkg.dev/strong-minutia-497313-f4/trading-repo/quant-ai-workers:latest
          imagePullPolicy: Always
          ports:
            - name: fastapi
              containerPort: 8000
            - name: image-worker
              containerPort: 8001
            - name: rag-worker
              containerPort: 8002
            - name: quant-worker
              containerPort: 8003
            - name: lstm-worker
              containerPort: 8004
          resources:
            requests:
              cpu: "100m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quant-ai-workers
  namespace: quant-trading
  labels:
    team: data
spec:
  selector:
    app: quant-ai-workers
  ports:
    - name: fastapi
      port: 8000
      targetPort: 8000
    - name: image-worker
      port: 8001
      targetPort: 8001
    - name: rag-worker
      port: 8002
      targetPort: 8002
    - name: quant-worker
      port: 8003
      targetPort: 8003
    - name: lstm-worker
      port: 8004
      targetPort: 8004
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-workers-keda
  namespace: quant-trading
  labels:
    team: data
spec:
  scaleTargetRef:
    name: quant-ai-workers
  minReplicaCount: 0
  maxReplicaCount: 3
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kubecost-prometheus-server.kubecost.svc.cluster.local:80
        metricName: http_requests_total
        threshold: '1'
        query: sum(rate(http_requests_total{pod=~"quant-ai-workers.*"}[1m]))
    - type: cron
      metadata:
        timezone: Europe/Athens
        start: 00 00 * * *
        end: 07 00 * * *
        desiredReplicas: "0"
