apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: quant-trading
  labels:
    team: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://quant_user:fleetpass@postgres:5432/quantdb?sslmode=disable"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: quant-trading
  labels:
    team: database
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
