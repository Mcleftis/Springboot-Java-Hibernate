apiVersion: v1
kind: Service
metadata:
  name: trading-backend-gke
  namespace: quant-trading
  labels:
    team: backend
  annotations:
    cloud.google.com/backend-config: '{"default": "quant-backendconfig"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: NodePort
  selector:
    app: trading-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-gke-ingress
  namespace: quant-trading
  labels:
    team: backend
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "quant-trading-ip"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: trading-backend-gke
                port:
                  number: 8080
