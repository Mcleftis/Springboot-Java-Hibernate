apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-worker
  namespace: quant-trading
spec:
  replicas: 1
  selector: { matchLabels: { app: quant-worker } }
  template:
    metadata: { labels: { app: quant-worker } }
    spec:
      containers:
        - name: quant-worker
          image: europe-west1-docker.pkg.dev/strong-minutia-497313-f4/trading-repo/quant-worker:v3
          ports: [{ containerPort: 8003 }]
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1536Mi" }
          livenessProbe:  { httpGet: { path: /health, port: 8003 }, initialDelaySeconds: 15, periodSeconds: 20 }
          readinessProbe: { httpGet: { path: /health, port: 8003 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: quant-worker, namespace: quant-trading }
spec:
  selector: { app: quant-worker }
  ports: [{ port: 8003, targetPort: 8003 }]
---
