apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: quant-trading
type: Opaque
stringData:
  db-user: quantadmin
  db-pass: fleetpass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-backend
  namespace: quant-trading
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-backend
  template:
    metadata:
      labels:
        app: trading-backend
    spec:
      containers:
        - name: trading-backend
          image: fleet-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/quantdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-pass
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: PYTHON_QUANT_URL
              value: http://quant-ai-workers:8003
            - name: PYTHON_LSTM_URL
              value: http://quant-ai-workers:8004
            - name: PYTHON_RAG_URL
              value: http://quant-ai-workers:8002
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: trading-backend
  namespace: quant-trading
spec:
  selector:
    app: trading-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-backend-hpa
  namespace: quant-trading
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-ingress
  namespace: quant-trading
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trading-backend
                port:
                  number: 8080
