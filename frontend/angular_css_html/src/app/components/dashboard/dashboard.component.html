<div style="padding: 20px; font-family: sans-serif; max-width: 1400px; margin: 0 auto;">
  <h1>Enterprise Quant AI Dashboard</h1>
  
  <div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 1; border: 2px solid blue; padding: 15px; border-radius: 5px;">
      <h3 style="color: blue; margin-top: 0;">1. QUANT / SMC DATA:</h3>
      <pre style="background: #f8f9fa; padding: 10px; overflow-x: auto;">{{ analysis | json }}</pre>
    </div>
    <div style="flex: 1; border: 2px solid purple; padding: 15px; border-radius: 5px;">
      <h3 style="color: purple; margin-top: 0;">2. LSTM DATA:</h3>
      <pre style="background: #f8f9fa; padding: 10px; overflow-x: auto;">{{ lstm | json }}</pre>
    </div>
  </div>

  <div style="border: 2px solid green; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
    <h3 style="color: green; margin-top: 0;">3. LIVE CHART:</h3>
    <canvas id="marketChart"></canvas>
  </div>

  <div style="border: 2px solid #e67e22; padding: 15px; border-radius: 5px; background-color: #fffaf0;">
    <h3 style="color: #e67e22; margin-top: 0;">4. RAG EXPERT (Financial Assistant):</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <input type="text" [(ngModel)]="ragQuestion" placeholder="Ρώτα κάτι για τα οικονομικά δεδομένα..." style="flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
      <button (click)="askRagExpert()" [disabled]="isRagLoading" style="padding: 10px 20px; font-size: 16px; background-color: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer;">
        {{ isRagLoading ? 'Ανάλυση...' : 'Ερώτηση' }}
      </button>
    </div>
    <div *ngIf="ragAnswer" style="background: white; border: 1px solid #eee; padding: 15px; border-radius: 4px; font-size: 15px; line-height: 1.5;">
      <strong>Απάντηση AI:</strong> <br><br> {{ ragAnswer }}
    </div>
  </div>
</div>
