name: CI Pipeline for GCP Artifact Registry

on:
  push:
    branches:
      - main

env:
  GCP_REGION: europe-west1
  GCP_PROJECT_ID: strong-minutia-497313-f4
  GAR_REPOSITORY: trading-repo

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend/Java
        run: ./mvnw clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push backend
        working-directory: backend/Java
        env:
          IMAGE_PATH: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/trading-backend
        run: |
          docker build -f Dockerfile.simple -t $IMAGE_PATH:${{ github.sha }} .
          docker push $IMAGE_PATH:${{ github.sha }}

  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: quant-worker
            context: backend/Python/python_ai_workers/Workers/quant
          - name: lstm-worker
            context: backend/Python/python_ai_workers/Workers/lstm
          - name: rag-worker
            context: backend/Python/python_ai_workers/Workers/rag
          - name: mcp-market-data
            context: backend/Python/python_ai_workers/Workers/mcp_server
          - name: quant-trading-ui
            context: frontend/angular_css_html
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push ${{ matrix.name }}
        working-directory: ${{ matrix.context }}
        env:
          IMAGE_PATH: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.name }}
        run: |
          docker build -t $IMAGE_PATH:${{ github.sha }} .
          docker push $IMAGE_PATH:${{ github.sha }}
